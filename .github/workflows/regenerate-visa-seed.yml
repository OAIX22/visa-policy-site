# 每日：从维基百科 API 拉取最新签证表 → 写入 data/wiki-visa-table.txt →
# 用 data/restcountries.json 生成 data/visa-seed.json（build 内 OVERRIDES 仍覆盖重点国）。
# 若两文件均无变化则跳过提交。
name: Regenerate visa seed

on:
  schedule:
    # 每天 01:00 UTC ≈ 北京时间 09:00（标准时）；可按需改 cron
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: regenerate-visa-seed
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Fetch Wikipedia visa table
        run: node scripts/fetch-wiki-visa-table.mjs

      - name: Regenerate visa-seed.json
        run: node scripts/build-visa-seed.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/wiki-visa-table.txt data/visa-seed.json
          if git diff --staged --quiet; then
            echo "No changes to wiki-visa-table.txt or visa-seed.json"
            exit 0
          fi
          git commit -m "chore(data): sync wiki visa table + visa-seed [skip ci]"
          git push
