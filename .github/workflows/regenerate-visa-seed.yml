# 每日根据仓库内 data/wiki-visa-table.txt + data/restcountries.json
# 重新生成 data/visa-seed.json 并提交（无变更则跳过提交）。
# 更新维基摘录时：直接改 wiki-visa-table.txt 推送到 main，次日定时任务会纳入生成结果。
name: Regenerate visa seed

on:
  schedule:
    # 每天 01:00 UTC ≈ 北京时间 09:00（标准时）；可按需改 cron
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: regenerate-visa-seed
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Regenerate visa-seed.json
        run: node scripts/build-visa-seed.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/visa-seed.json
          if git diff --staged --quiet; then
            echo "No changes to visa-seed.json"
            exit 0
          fi
          git commit -m "chore(data): regenerate visa-seed.json [skip ci]"
          git push
